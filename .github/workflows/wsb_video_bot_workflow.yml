name: WSB Video Bot

on:
  # Allow manual trigger
  workflow_dispatch:
    inputs:
      telegram_chat_id:
        description: 'Telegram Chat ID'
        required: false
        default: '-1003444893572'
      version:
        description: 'Docker镜像版本标签'
        required: false
        default: 'latest'
        type: string

jobs:
  run_wsb_video_bot:
    runs-on: ubuntu-22.04
    timeout-minutes: 50
    
    steps:
      - name: Run wsb_video_bot
        run: |
          IMAGE_VERSION="${{ github.event.inputs.version || 'latest' }}"
          docker pull ghcr.io/yjq001/wsb_video_bot:${IMAGE_VERSION}
          
          docker run --rm --network host \
            --name wsb_video_bot \
            -e TELEGRAM_BOT_TOKEN="${{ secrets.TELEGRAM_BOT_TOKEN }}" \
            -e TELEGRAM_CHAT_ID="${{ github.event.inputs.telegram_chat_id || '-1003444893572' }}" \
            -e TELEGRAM_NOTIFY_ENABLED=true \
            -e TELEGRAM_NOTIFY_URL="https://code.easyllms.com/api/telegram/send" \
            -e TELEGRAM_TIMEOUT_S=10 \
            ghcr.io/yjq001/wsb_video_bot:${IMAGE_VERSION}
      
      - name: Send Telegram notification
        if: always()
        run: |
          # 判断工作流状态
          if [ "${{ job.status }}" == "success" ]; then
            STATUS_EMOJI="✅"
            STATUS_TEXT="成功"
          else
            STATUS_EMOJI="❌"
            STATUS_TEXT="失败"
          fi
          
          # 获取工作流信息
          WORKFLOW_NAME="${{ github.workflow }}"
          RUN_NUMBER="${{ github.run_number }}"
          RUN_ID="${{ github.run_id }}"
          ACTOR="${{ github.actor }}"
          REPO="${{ github.repository }}"
          VERSION="${{ github.event.inputs.version || 'latest' }}"
          CHAT_ID="${{ github.event.inputs.telegram_chat_id || '-1003444893572' }}"
          
          # 构建消息内容
          MESSAGE=$(cat <<EOF
          ${STATUS_EMOJI} *工作流执行${STATUS_TEXT}*

          📋 *工作流信息*
          • 名称: ${WORKFLOW_NAME}
          • 运行编号: #${RUN_NUMBER}
          • 触发者: ${ACTOR}
          • 仓库: ${REPO}
          • 镜像版本: ${VERSION}

          🤖 *Bot信息*
          • Bot: WSB Video Bot

          🔗 *查看详情*
          [查看运行日志](https://github.com/${REPO}/actions/runs/${RUN_ID})
          EOF
          )
          
          # 使用 Python 构建 JSON（安全处理特殊字符）
          export MESSAGE CHAT_ID
          python3 <<'PYTHON_SCRIPT'
          import json
          import os
          
          message = os.environ.get('MESSAGE', '')
          chat_id = os.environ.get('CHAT_ID', '')
          
          payload = {
              "chat_id": chat_id,
              "text": message,
              "parse_mode": "Markdown",
              "disable_web_page_preview": True
          }
          
          with open("/tmp/telegram_message.json", "w", encoding="utf-8") as f:
              json.dump(payload, f, ensure_ascii=False, indent=2)
          PYTHON_SCRIPT
          
          # 发送 Telegram 消息
          curl -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -H "Content-Type: application/json" \
            -d @/tmp/telegram_message.json \
            --fail --show-error || echo "Telegram notification failed, but continuing workflow"
      

