name: Generate Market Report

on:
  # 仅支持手动触发
  workflow_dispatch:
    inputs:
      model:
        description: 'GPT模型名称'
        required: false
        default: 'openai/gpt-5.4-mini'
        type: choice
        options:
          - 'openai/gpt-5.4-mini'
          - 'nvidia/nemotron-3-ultra-550b-a55b'
      gpt_base_url:
        description: 'OpenAI API Base URL'
        required: false
        default: 'https://gateway.ai.cloudflare.com/v1/cbb425c1b4186b90437390d353e01ce8/openrouter/openrouter'
        type: choice
        options:
          - 'https://gateway.ai.cloudflare.com/v1/cbb425c1b4186b90437390d353e01ce8/openrouter/openrouter'
          - 'https://integrate.api.nvidia.com/v1'
      api_key:
        description: 'API Key (选 NVIDIA 留空即可，后台将自动赋默认值 nvapi-sQ83...)'
        required: false
        default: ''
        type: string

jobs:
  generate_market_report:
    runs-on: ubuntu-22.04
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: Checkout private repository
        uses: actions/checkout@v4
        with:
          repository: yjq001/sex-robot
          path: ./sex-robot
          token: ${{ secrets.PAT_TOKEN }}
          ref: master
          fetch-depth: 1
          persist-credentials: false

      - name: Copy files from private repository
        run: |
          cp -r ./sex-robot/* ./
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12.9'
          cache: 'pip'
      
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y wkhtmltopdf fonts-wqy-microhei fonts-wqy-zenhei xfonts-wqy
          sudo fc-cache -f -v
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --upgrade pip setuptools wheel
          pip install -r infos/requirements.txt
      
      - name: Run market report generator
        env:
          INPUT_MODEL: ${{ github.event.inputs.model || 'openai/gpt-5.4-mini' }}
          INPUT_BASE_URL: ${{ github.event.inputs.gpt_base_url }}
          INPUT_API_KEY: ${{ github.event.inputs.api_key }}
          SECRET_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          MODEL="$INPUT_MODEL"
          GPT_BASE_URL="$INPUT_BASE_URL"
          
          # 根据模型自动选择或应用对应的 API Key 与 Base URL
          if [ ! -z "$INPUT_API_KEY" ]; then
            OPENAI_API_KEY="$INPUT_API_KEY"
          elif [ "$MODEL" = "nvidia/nemotron-3-ultra-550b-a55b" ]; then
            OPENAI_API_KEY="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"
            # 如果选择 NVIDIA 模型时 Base URL 未选对，自动匹配为 NVIDIA API 地址
            if [ "$GPT_BASE_URL" = "https://gateway.ai.cloudflare.com/v1/cbb425c1b4186b90437390d353e01ce8/openrouter/openrouter" ]; then
              GPT_BASE_URL="https://integrate.api.nvidia.com/v1"
            fi
          else
            OPENAI_API_KEY="$SECRET_API_KEY"
          fi

          # 更新配置文件中的GPT base URL
          if [ ! -z "$GPT_BASE_URL" ]; then
            sed -i "s|API_BASE_URL = .*|API_BASE_URL = $GPT_BASE_URL|" infos/config.ini
          fi
          # 更新配置文件中的API Key
          if [ ! -z "$OPENAI_API_KEY" ]; then
            sed -i "s|OPENAI_API_KEY = .*|OPENAI_API_KEY = $OPENAI_API_KEY|" infos/config.ini
          fi
          # Run the report generator
          cd infos
          python market_report_generator.py --model "$MODEL"
      
      - name: Upload reports as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: market-reports
          path: |
            infos/reports/*.html
            infos/reports/*.png
            infos/reports/charts/*.png
            infos/reports/qrcode.jpg
          retention-days: 7
      
      - name: Get current date
        id: date
        run: |
          # 获取北京时间（UTC+8）的日期
          echo "date=$(TZ='Asia/Shanghai' date +'%Y-%m-%d')" >> $GITHUB_OUTPUT
          echo "date_compact=$(TZ='Asia/Shanghai' date +'%Y%m%d')" >> $GITHUB_OUTPUT
      
      - name: Prepare files for GitHub Pages
        run: |
          # 创建日期目录
          mkdir -p ./gh-pages-deploy/${{ steps.date.outputs.date_compact }}
          
          # 复制报告文件到日期目录
          cp -r ./infos/reports/* ./gh-pages-deploy/${{ steps.date.outputs.date_compact }}/
          
          # 同时复制到根目录以保持兼容性
          cp -r ./infos/reports/* ./gh-pages-deploy/
          
          # 查找并删除90天前的旧文件夹
          find ./gh-pages-deploy -maxdepth 1 -type d -name "20[0-9][0-9][0-9][0-9][0-9][0-9][0-9][0-9]" -mtime +90 -exec rm -rf {} \;
          
          echo "准备完成，将部署以下文件："
          find ./gh-pages-deploy -type f | sort
      
      - name: List all generated files
        run: |
          echo "Generated files:"
          find infos/reports -type f | sort
      
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          personal_token: ${{ secrets.PAT_TOKEN }}
          publish_dir: ./gh-pages-deploy
          destination_dir: ./
          keep_files: true
          force_orphan: false
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          commit_message: 'Deploy market report: ${{ steps.date.outputs.date }}'
          cname: ${{ github.repository_owner }}.github.io
      
      - name: Wait for GitHub Pages deployment
        run: |
          echo "等待 GitHub Pages 部署完成..."
          
          # 最多等待 1 小时（3600 秒）
          MAX_WAIT=3600
          ELAPSED=0
          INTERVAL=60
          
          while [ $ELAPSED -lt $MAX_WAIT ]; do
            # 检查页面是否可访问（HTTP 200）
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
              "https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/${{ steps.date.outputs.date_compact }}/market_report_zh.html" \
              || echo "000")
            
            if [ "$HTTP_CODE" = "200" ]; then
              echo "✅ GitHub Pages 部署成功！页面已可访问（HTTP $HTTP_CODE）"
              echo "⏱️  总等待时间: $ELAPSED 秒"
              break
            else
              MINUTES=$((ELAPSED / 60))
              echo "⏳ 等待中... (已等待 $MINUTES 分钟 / 最多 60 分钟) - HTTP $HTTP_CODE"
              sleep $INTERVAL
              ELAPSED=$((ELAPSED + INTERVAL))
            fi
          done
          
          if [ $ELAPSED -ge $MAX_WAIT ]; then
            echo "⚠️  等待超时（1小时），但继续执行通知步骤"
          fi
      
      - name: Send Telegram notification
        run: |
          # 构建 Markdown 格式的通知文案
          cat > /tmp/telegram_message.json <<'EOF'
          {
            "text": "**📊 美股市场简报**\n \n 📅 **日期**: DATE_PLACEHOLDER\n\n [👉 立即查看完整报告](https://OWNER_PLACEHOLDER.github.io/REPO_PLACEHOLDER/DATE_COMPACT_PLACEHOLDER/market_report_zh.html)\n\n---\n\n🛒 **如何订阅更多专业策略？**\n\n① 网页快捷订购：\n🔗 [点击此处订购 AI 策略](https://code.easyllms.cn/product-order.html?login_type=auto&source=feishu)\n\n② 微信搜索并关注公众号：**StockGate美股通**\n点击底部菜单：`股神星` ➔ `AI策略` ➔ `订购`\n🔗 [点击此处查看公众号二维码](https://cos.easyllms.com/others/qrcode.jpg)"
          }
          EOF
          
          # 替换占位符
          sed -i "s/DATE_PLACEHOLDER/${{ steps.date.outputs.date }}/g" /tmp/telegram_message.json
          sed -i "s/DATE_COMPACT_PLACEHOLDER/${{ steps.date.outputs.date_compact }}/g" /tmp/telegram_message.json
          sed -i "s/OWNER_PLACEHOLDER/${{ github.repository_owner }}/g" /tmp/telegram_message.json
          sed -i "s/REPO_PLACEHOLDER/${{ github.event.repository.name }}/g" /tmp/telegram_message.json
          
          # 发送 POST 请求到 Telegram API
          curl -X POST https://code.easyllms.com/api/telegram/send \
            -H "Content-Type: application/json" \
            -d @/tmp/telegram_message.json \
            --fail --show-error || echo "Telegram notification failed, but continuing workflow"

      - name: Send email with reports
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.qq.com
          server_port: 465
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: 美股市场简报(${{ steps.date.outputs.date }})
          to: 471197995@qq.com
          from: 市场简报自动生成器 <${{ secrets.EMAIL_USERNAME }}>
          secure: true
          ignore_cert: true
          convert_markdown: false
          priority: high
          body: |
            <div style="font-family: Arial, sans-serif; padding: 20px;">
              <p>您好，</p>
              
              <p>今日 美股市场简报(${{ steps.date.outputs.date }}) 已生成，请通过以下链接查看：</p>
              <p>
                <a href="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/${{ steps.date.outputs.date_compact }}/market_report_zh.html" style="color: #007bff; text-decoration: none;">📊 中文版报告</a>
              </p>
              
              <p>历史报告：</p>
              <p>
                <a href="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/" style="color: #007bff; text-decoration: none;">📚 查看所有历史报告</a>
              </p>
              
              <p style="color: #666; font-size: 12px; margin-top: 30px;">此邮件由自动化系统发送，请勿回复。</p>
            </div>
          content_type: text/html
